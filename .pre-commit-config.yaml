repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file pyproject.toml
        language: system
        pass_filenames: false
        require_serial: true
